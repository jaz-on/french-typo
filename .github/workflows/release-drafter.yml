name: Release Drafter

# Merge triggers both `pull_request: closed` and `push` to main; running Release Drafter
# on both can create duplicate draft releases. `closed` is omitted so only `push` refreshes
# the draft after merge; other PR events still update the draft during review.
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, edited, labeled, unlabeled]
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

